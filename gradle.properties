# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Disable JDK image transform to bypass jlink issues
android.jdk.cache.disabled=true
android.experimental.jdk.image.transform.disabled=true
android.jdk.image.transform.disabled=true
# Newer AGP flag
android.toolchain.image.transform.enabled=false

# Force a specific JDK if the auto-detected one is broken
# org.gradle.java.home=C:\\Program Files\\Android\\Android Studio\\jbr




